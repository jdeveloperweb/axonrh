server:
  port: 8081

spring:
  application:
    name: auth-service

  # Datasource PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:axonrh}
    username: ${DB_USER:axonrh}
    password: ${DB_PASSWORD:axonrh123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: shared
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: auth_service_schema_history
    schemas: shared
    default-schema: shared
    create-schemas: true

  # Email / SMTP
  mail:
    host: ${MAIL_HOST:smtp.hostinger.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@mjolnix.com.br}
    password: ${MAIL_PASSWORD:P3dr0l3m02#@1}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

axonrh:
  flyway:
    repair-on-startup: ${AXONRH_FLYWAY_REPAIR_ON_STARTUP:true}

  mail:
    from: ${MAIL_USERNAME:noreply@mjolnix.com.br}
    from-name: ${MAIL_FROM_NAME:AxonRH}

  services:
    config-service-url: ${CONFIG_SERVICE_URL:http://localhost:8082}

  mfa:
    setup-token-ttl-minutes: 30

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:axonrh_redis_2026}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:axonrh-jwt-secret-key-change-in-production-2026}
  access-token-expiration: 28800000  # 8 horas em ms
  refresh-token-expiration: 604800000  # 7 dias em ms

# Security Configuration
security:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special: true
  login:
    max-attempts: 5
    lockout-duration-minutes: 15
  totp:
    issuer: AxonRH
    digits: 6
    period: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.axonrh: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
